<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MC Treasury</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      min-height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;

      padding: 40px 20px;

      background:
        linear-gradient(
          135deg,
          #0f0f0f,
          #1a1a1a
        );

      color: white;

      font-family:
        Arial,
        sans-serif;
    }

    h1 {

      font-size: 48px;

      margin-bottom: 35px;

      color: #d32f2f;

      letter-spacing: 3px;

      text-transform: uppercase;

      text-shadow:
        0 0 15px rgba(211,47,47,0.35);
    }

    h2 {

      margin-top: 0;

      margin-bottom: 25px;

      color: #ffffff;

      font-size: 28px;
    }

    .card {

      width: 100%;

      max-width: 700px;

      background:
        rgba(22, 22, 22, 0.96);

      border:
        1px solid #2a2a2a;

      border-radius: 22px;

      padding: 30px;

      margin-bottom: 25px;

      box-shadow:
        0 0 35px rgba(0,0,0,0.55);
    }

    label {

      display: block;

      margin-bottom: 10px;

      color: #bbbbbb;

      font-size: 14px;

      font-weight: bold;
    }

    input,
    select {

      width: 100%;

      padding: 15px;

      margin-bottom: 22px;

      background: #101010;

      border:
        1px solid #333;

      color: white;

      border-radius: 12px;

      font-size: 15px;

      transition: 0.2s;
    }

    input:focus,
    select:focus {

      outline: none;

      border-color: #d32f2f;

      box-shadow:
        0 0 12px rgba(211,47,47,0.35);
    }

    button {

      width: 100%;

      background:
        linear-gradient(
          135deg,
          #b71c1c,
          #d32f2f
        );

      color: white;

      border: none;

      padding:
        16px;

      border-radius: 14px;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.25s;
    }

    button:hover {

      transform: translateY(-2px);

      box-shadow:
        0 10px 25px rgba(211,47,47,0.35);
    }

    .movement-preview {

      margin-top: 25px;

      padding: 22px;

      background: #111;

      border:
        1px solid #333;

      border-radius: 14px;

      line-height: 1.8;

      font-size: 15px;
    }

    .preview-title {

      color: #d32f2f;

      font-size: 18px;

      font-weight: bold;

      margin-bottom: 15px;
    }

  </style>

</head>

<body>

  <h1>MC Treasury</h1>

  <div class="card">

    <h2>Ajouter un mouvement</h2>

    <label>Membre</label>

    <select id="memberSelect"></select>

    <label>Sortie</label>

    <select id="removeItem">
      <option>Argent Propre</option>
      <option>Argent Sale</option>
      <option>Coke</option>
      <option>Crack</option>
      <option>Ecstasy</option>
      <option>Fentanyl</option>
      <option>Gillet Par Balle</option>
      <option>Meth</option>
      <option>Munitions</option>
      <option>Opium</option>
      <option>Weed</option>
    </select>

    <input
      type="number"
      id="removeQuantity"
      placeholder="Quantité sortie"
    >

    <label>Entrée</label>

    <select id="addItem">
      <option>Argent Propre</option>
      <option>Argent Sale</option>
      <option>Coke</option>
      <option>Crack</option>
      <option>Ecstasy</option>
      <option>Fentanyl</option>
      <option>Gillet Par Balle</option>
      <option>Meth</option>
      <option>Munitions</option>
      <option>Opium</option>
      <option>Weed</option>
    </select>

    <input
      type="number"
      id="addQuantity"
      placeholder="Quantité entrée"
    >

    <label>Note</label>

    <input
      type="text"
      id="note"
      placeholder="Note RP"
    >

    <button onclick="submitMovement()">
      Valider le mouvement
    </button>

    <div
      id="preview"
      class="movement-preview"
      style="display:none;"
    ></div>

  </div>

  <script>

    // =========================================
    // URL APPS SCRIPT
    // =========================================

    const API_URL =
      'https://script.google.com/macros/s/AKfycbxM0e_7kCpeuHJbPx4bNAROjsvYfbuva5fr_c24dzLoiraBMmmGWhgh3SxYmfuSAqS4/exec';

    // =========================================

    async function loadMembers() {

      const response =
        await fetch('./data/members.json');

      const members =
        await response.json();

      const select =
        document.getElementById('memberSelect');

      select.innerHTML = '';

      members.forEach(member => {

        select.innerHTML += `
          <option>${member}</option>
        `;
      });
    }

    async function submitMovement() {

      const member =
        document.getElementById('memberSelect').value;

      const removeItem =
        document.getElementById('removeItem').value;

      const removeQuantity =
        document.getElementById('removeQuantity').value;

      const addItem =
        document.getElementById('addItem').value;

      const addQuantity =
        document.getElementById('addQuantity').value;

      const note =
        document.getElementById('note').value;

      if (
        !removeQuantity &&
        !addQuantity
      ) {
        alert('Remplis toutes les quantités');
        return;
      }

      const movement = {

        member,

        removeItem,
        removeQuantity,

        addItem,
        addQuantity,

        note
      };

      try {

        await fetch(API_URL, {

          method: 'POST',

          body: JSON.stringify(movement)
        });

        const preview =
          document.getElementById('preview');

        preview.style.display = 'block';

        preview.innerHTML = `

          <div class="preview-title">
            Mouvement enregistré
          </div>

          <strong>Membre :</strong>
          ${member}

          <br><br>

          <strong>Sortie :</strong>
          ${removeQuantity} ${removeItem}

          <br><br>

          <strong>Entrée :</strong>
          ${addQuantity} ${addItem}

          <br><br>

          <strong>Note :</strong>
          ${note}
        `;

        document.getElementById('removeQuantity').value = '';

        document.getElementById('addQuantity').value = '';

        document.getElementById('note').value = '';

        alert('Mouvement envoyé');

      } catch (error) {

        console.error(error);

        alert('Erreur lors de l’envoi');
      }
    }

    loadMembers();

  </script>

</body>

</html>
